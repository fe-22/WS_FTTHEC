{% extends 'base.html' %}

{% block title %}Recuperar Senha - Fthec Sistemas e Automação{% endblock %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title mb-4">Recuperar senha</h3>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_email" class="form-label">E-mail</label>
                            <input type="email" name="email" required class="form-control" id="id_email">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enviar link de redefinicao</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
