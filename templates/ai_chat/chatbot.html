{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0"><i class="fas fa-robot"></i> 🤖 Chatbot Fthec Sistemas e Automação</h3>
                </div>
                <div class="card-body">
                    <!-- Área do Chat -->
                    <div id="chat-container" style="height: 400px; overflow-y: auto; padding: 15px; background-color: #f8f9fa; border-radius: 5px;">
                        <div id="chat-messages">
                            <div class="alert alert-success">
                                <strong>Assistente:</strong> Olá! Sou o chatbot da Fthec sistemas e automação. Como posso ajudar?
                            </div>
                        </div>
                    </div>
                    
                    <!-- Input para mensagem -->
                    <div class="input-group mt-3">
                        <input type="text" id="user-input" class="form-control" placeholder="Digite sua mensagem..." autofocus>
                        <button class="btn btn-primary" id="send-button">
                            <i class="fas fa-paper-plane"></i> Enviar
                        </button>
                    </div>
                    
                    <!-- Perguntas rápidas -->
                    <div class="mt-3">
                        <small class="text-muted">Perguntas rápidas:</small>
                        <div class="mt-2">
                            <button class="btn btn-sm btn-outline-primary quick-question" data-question="Olá">
                                👋 Dizer Olá
                            </button>
                            <button class="btn btn-sm btn-outline-primary quick-question" data-question="Como faço a inscrição?">
                                📝 Inscrição
                            </button>
                            <button class="btn btn-sm btn-outline-primary quick-question" data-question="Que horas funciona?">
                                🕐 Horários
                            </button>
                            <button class="btn btn-sm btn-outline-primary quick-question" data-question="Teste">
                                🔧 Testar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Voltar para home -->
            <div class="mt-3 text-center">
                <a href="{% url 'home' %}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Voltar para Home
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Inclui o JavaScript do chatbot -->
<script src="{% static 'js/chatbot.js' %}"></script>
{% endblock %}
