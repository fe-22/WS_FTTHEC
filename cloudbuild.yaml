# Variáveis de substituição — configure no trigger do Cloud Build (GCP Console > Cloud Build > Triggers > editar)
# _CLOUD_SQL_CONNECTION_NAME : PROJECT_ID:southamerica-east1:INSTANCE_NAME  (ex: meu-projeto:southamerica-east1:erp-db)
# _SECRET_KEY                : sua chave secreta longa e aleatória
# _DB_PASSWORD               : senha do usuário root do Cloud SQL
# _DB_USER                   : usuário do banco (padrão: root)
# _DB_NAME                   : nome do banco (padrão: erp_fthec)
substitutions:
  _CLOUD_SQL_CONNECTION_NAME: 'PREENCHA_NO_TRIGGER'
  _SECRET_KEY: 'PREENCHA_NO_TRIGGER'
  _DB_PASSWORD: 'PREENCHA_NO_TRIGGER'
  _DB_USER: 'root'
  _DB_NAME: 'erp_fthec'
  _SERVICE_NAME: 'erp-django-app'

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
      - '.'

  # Push the Docker image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'

  # Deploy to Cloud Run with Cloud SQL Auth Proxy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region'
      - 'southamerica-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '10'
      # Cloud SQL Auth Proxy — conecta via Unix socket (sem TCP direto)
      - '--add-cloudsql-instances'
      - '$_CLOUD_SQL_CONNECTION_NAME'
      - '--set-env-vars'
      - 'DEBUG=False,DJANGO_SETTINGS_MODULE=erp_site.settings,CLOUD_SQL_CONNECTION_NAME=$_CLOUD_SQL_CONNECTION_NAME,DB_NAME=$_DB_NAME,DB_USER=$_DB_USER'
      # Segredos do Secret Manager (evita expor credenciais em logs)
      # Pré-requisito: crie os segredos no Secret Manager com estes nomes exatos:
      #   gcloud secrets create SECRET_KEY --replication-policy="automatic"
      #   echo -n "sua_secret_key" | gcloud secrets versions add SECRET_KEY --data-file=-
      #   gcloud secrets create DB_PASSWORD --replication-policy="automatic"
      #   echo -n "sua_senha" | gcloud secrets versions add DB_PASSWORD --data-file=-
      - '--update-secrets'
      - 'SECRET_KEY=SECRET_KEY:latest,DB_PASSWORD=DB_PASSWORD:latest'

# Set timeout
timeout: '1200s'