# Variáveis de substituição — configure no trigger do Cloud Build (GCP Console > Cloud Build > Triggers > editar)
# _CLOUD_SQL_CONNECTION_NAME : PROJECT_ID:southamerica-east1:INSTANCE_NAME  (ex: meu-projeto:southamerica-east1:erp-db)
# _SECRET_KEY                : sua chave secreta longa e aleatória
# _DB_PASSWORD               : senha do usuário root do Cloud SQL
# _DB_USER                   : usuário do banco (padrão: root)
# _DB_NAME                   : nome do banco (padrão: erp_fthec)
substitutions:
  _CLOUD_SQL_CONNECTION_NAME: 'PREENCHA_NO_TRIGGER'
  _SECRET_KEY: 'PREENCHA_NO_TRIGGER'
  _DB_PASSWORD: 'PREENCHA_NO_TRIGGER'
  _DB_USER: 'root'
  _DB_NAME: 'erp_fthec'
  _SERVICE_NAME: 'erp-django-app'

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
      - '.'

  # Push the Docker image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'

  # Executar migrations Django via Cloud SQL Auth Proxy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - '-c'
      - |
        # Inicia o Cloud SQL Auth Proxy em background
        wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64 -O /cloud-sql-proxy
        chmod +x /cloud-sql-proxy
        /cloud-sql-proxy --unix-socket /cloudsql norse-wavelet-484820-u1:us-central1:free-trial-first-project &
        sleep 3
        # Instala dependências e executa migrate
        pip install -r requirements.txt -q
        CLOUD_SQL_CONNECTION_NAME=$_CLOUD_SQL_CONNECTION_NAME \
        DB_NAME=$_DB_NAME \
        DB_USER=$_DB_USER \
        DB_PASSWORD=$$DB_PASSWORD \
        SECRET_KEY=$$SECRET_KEY \
        python manage.py migrate --noinput
    secretEnv: ['SECRET_KEY', 'DB_PASSWORD']

  # Deploy to Cloud Run with Cloud SQL Auth Proxy
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - 'gcr.io/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region'
      - 'southamerica-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '10'
      # Cloud SQL Auth Proxy — conecta via Unix socket (sem TCP direto)
      - '--add-cloudsql-instances'
      - 'norse-wavelet-484820-u1:us-central1:free-trial-first-project'
      - '--set-env-vars'
      - 'DEBUG=False,DJANGO_SETTINGS_MODULE=erp_site.settings,CLOUD_SQL_CONNECTION_NAME=norse-wavelet-484820-u1:us-central1:free-trial-first-project,DB_NAME=$_DB_NAME,DB_USER=$_DB_USER'
      # Segredos do Secret Manager (evita expor credenciais em logs)
      # Pré-requisito: crie os segredos no Secret Manager com estes nomes exatos:
      #   gcloud secrets create SECRET_KEY --replication-policy="automatic"
      #   echo -n "sua_secret_key" | gcloud secrets versions add SECRET_KEY --data-file=-
      #   gcloud secrets create DB_PASSWORD --replication-policy="automatic"
      #   echo -n "sua_senha" | gcloud secrets versions add DB_PASSWORD --data-file=-
      - '--update-secrets'
      - 'SECRET_KEY=SECRET_KEY:latest,DB_PASSWORD=DB_PASSWORD:latest'

# Set timeout
timeout: '1200s'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/SECRET_KEY/versions/latest
      env: 'SECRET_KEY'
    - versionName: projects/$PROJECT_ID/secrets/DB_PASSWORD/versions/latest
      env: 'DB_PASSWORD'