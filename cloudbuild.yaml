# Cloud Build trigger para deploy Django no Cloud Run.
# Stack: Artifact Registry + Cloud SQL (MySQL) + Secret Manager.
#
# Configure as substitutions no trigger do Cloud Build:
# Obrigatorias:
#   _CLOUD_SQL_CONNECTION_NAME = PROJECT:REGION:INSTANCE
#   _ALLOWED_HOSTS = dominio.com,www.dominio.com
#   _CSRF_TRUSTED_ORIGINS = https://dominio.com,https://www.dominio.com
# Opcionais:
#   _CORS_ALLOWED_ORIGINS (se vazio, use o mesmo valor de _CSRF_TRUSTED_ORIGINS)
#   _SERVICE_NAME, _REGION, _AR_REPO, _DB_USER, _DB_NAME
#
# Secrets esperados no Secret Manager:
#   SECRET_KEY
#   DB_PASSWORD
#   OPENAI_API_KEY

substitutions:
  _SERVICE_NAME: ws-fthec
  _REGION: southamerica-east1
  _AR_REPO: ws-fthec
  _CLOUD_SQL_CONNECTION_NAME: PREENCHA_NO_TRIGGER
  _DB_USER: root
  _DB_NAME: erp_fthec
  _ALLOWED_HOSTS: PREENCHA_NO_TRIGGER
  _CSRF_TRUSTED_ORIGINS: PREENCHA_NO_TRIGGER
  _CORS_ALLOWED_ORIGINS: PREENCHA_NO_TRIGGER

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: enable-required-apis
    entrypoint: gcloud
    args:
      - services
      - enable
      - run.googleapis.com
      - artifactregistry.googleapis.com
      - cloudbuild.googleapis.com
      - sqladmin.googleapis.com
      - secretmanager.googleapis.com

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: ensure-artifact-registry
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        gcloud artifacts repositories describe "$_AR_REPO" \
          --location="$_REGION" >/dev/null 2>&1 || \
        gcloud artifacts repositories create "$_AR_REPO" \
          --repository-format=docker \
          --location="$_REGION" \
          --description="Docker images for $_SERVICE_NAME"

  - name: gcr.io/cloud-builders/docker
    id: build-image
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    id: push-image
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-cloud-run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$COMMIT_SHA
      - --region
      - $_REGION
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --memory
      - 1Gi
      - --cpu
      - "1"
      - --max-instances
      - "10"
      - --add-cloudsql-instances
      - $_CLOUD_SQL_CONNECTION_NAME
      - --set-env-vars
      - DEBUG=False,DJANGO_SETTINGS_MODULE=erp_site.settings,ALLOWED_HOSTS=$_ALLOWED_HOSTS,CSRF_TRUSTED_ORIGINS=$_CSRF_TRUSTED_ORIGINS,CORS_ALLOWED_ORIGINS=$_CORS_ALLOWED_ORIGINS,DB_HOST=/cloudsql/$_CLOUD_SQL_CONNECTION_NAME,DB_PORT=3306,DB_NAME=$_DB_NAME,DB_USER=$_DB_USER,USE_X_FORWARDED_HOST=True,SECURE_SSL_REDIRECT=True
      - --update-secrets
      - SECRET_KEY=SECRET_KEY:latest,DB_PASSWORD=DB_PASSWORD:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest

timeout: 1200s
