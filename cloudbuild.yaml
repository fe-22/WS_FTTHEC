substitutions:
  _SERVICE_NAME: ws-fthec
  _REGION: southamerica-east1
  _AR_REPO: ws-fthec
  _FIRESTORE_PROJECT_ID: $PROJECT_ID
  _ALLOWED_HOSTS: PREENCHA_NO_TRIGGER
  _CSRF_TRUSTED_ORIGINS: PREENCHA_NO_TRIGGER
  _CORS_ALLOWED_ORIGINS: PREENCHA_NO_TRIGGER

steps:
  # 🔹 Ativa APIs necessárias
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: enable-required-apis
    entrypoint: gcloud
    args:
      - services
      - enable
      - run.googleapis.com
      - artifactregistry.googleapis.com
      - cloudbuild.googleapis.com
      - firestore.googleapis.com
      - secretmanager.googleapis.com

  # 🔹 Garante que o Artifact Registry existe
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: ensure-artifact-registry
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        gcloud artifacts repositories describe "$_AR_REPO" \
          --location="$_REGION" >/dev/null 2>&1 || \
        gcloud artifacts repositories create "$_AR_REPO" \
          --repository-format=docker \
          --location="$_REGION" \
          --description="Docker images for $_SERVICE_NAME"

  # 🔹 Build da imagem
  - name: gcr.io/cloud-builders/docker
    id: build-image
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$SHORT_SHA
      - .

  # 🔹 Push da imagem
  - name: gcr.io/cloud-builders/docker
    id: push-image
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$SHORT_SHA

  # 🔹 Deploy no Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-cloud-run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$SHORT_SHA
      - --region
      - $_REGION
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --memory
      - 1Gi
      - --cpu
      - "1"
      - --max-instances
      - "10"
      - --set-env-vars
      - DEBUG=False,DJANGO_SETTINGS_MODULE=erp_site.settings,ALLOWED_HOSTS=$_ALLOWED_HOSTS,CSRF_TRUSTED_ORIGINS=$_CSRF_TRUSTED_ORIGINS,CORS_ALLOWED_ORIGINS=$_CORS_ALLOWED_ORIGINS,FIRESTORE_PROJECT_ID=$_FIRESTORE_PROJECT_ID,USE_X_FORWARDED_HOST=True,SECURE_SSL_REDIRECT=True
      - --update-secrets
      - SECRET_KEY=SECRET_KEY:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE_NAME:$SHORT_SHA

timeout: 1200s
